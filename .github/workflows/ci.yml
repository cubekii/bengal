# CI pipeline for Bengal language project
# Builds and tests all workspace components:
# - bengal-cli: Main CLI binary
# - bengal-compiler: Compiler library
# - sparkler: Virtual machine
# - bengal-std: Standard library

name: CI

on:
  push:
    branches:
      - main
      - master
      - bengal-pipelines  # Development branch for pipeline features
  pull_request:
    branches:
      - main
      - master
      - bengal-pipelines

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose
