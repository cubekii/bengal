# CI pipeline for Bengal language project
# Builds and tests all workspace components:
# - bengal-cli: Main CLI binary
# - bengal-compiler: Compiler library
# - sparkler: Virtual machine
# - bengal-std: Standard library

name: CI

on:
  push:
    branches:
      - main
      - pipelines_updates
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: install requirements
        run: |
          sudo apt update
          sudo apt install -y 

      - name: build compiler
        run: cargo build --release

      - name: unit tests
        run: sh tests.sh