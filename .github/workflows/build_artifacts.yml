on:
  push:

  pull_request:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bengal

jobs:
  build-debian:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-debian-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev

      - name: Build Debian package (with build)
        run: cargo deb

      - name: Package std files
        run: |
          mkdir -p target/debian/usr/share/bengal/std
          cp std/*.bl target/debian/usr/share/bengal/std/

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-debian-${{ matrix.arch }}
          path: target/debian/*.deb
          retention-days: 30

      - name: Upload .deb to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/debian/*.deb
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rpm-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev rpm

      - name: Build release binary
        run: cargo build --release

      - name: Generate RPM package
        run: cargo generate-rpm

      - name: Package std files
        run: |
          mkdir -p target/generate-rpm/usr/share/bengal/std
          cp std/*.bl target/generate-rpm/usr/share/bengal/std/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-rpm-${{ matrix.arch }}
          path: target/generate-rpm/*.rpm
          retention-days: 30

      - name: Upload .rpm to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/generate-rpm/*.rpm
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

  build-archlinux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arch-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev zstd

      - name: Build release binary
        run: cargo build --release

      - name: Create Arch Linux package
        run: |
          mkdir -p artifacts/usr/bin
          mkdir -p artifacts/usr/share/licenses/bengal
          mkdir -p artifacts/usr/share/bengal/std
          cp target/release/bengal artifacts/usr/bin/
          cp LICENSE artifacts/usr/share/licenses/bengal/
          cp std/*.bl artifacts/usr/share/bengal/std/
          chmod 755 artifacts/usr/bin/bengal
          chmod 644 artifacts/usr/share/licenses/bengal/LICENSE
          chmod 644 artifacts/usr/share/bengal/std/*.bl
          cd artifacts
          tar -cvf ../bengal.pkg.tar usr
          cd ..
          zstd -19 bengal.pkg.tar --rm

      - name: Upload Arch Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-archlinux-${{ matrix.arch }}
          path: bengal.pkg.tar.zst
          retention-days: 30

      - name: Upload .pkg.tar.zst to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bengal.pkg.tar.zst
          tag: ${{ github.ref }}

  build-alpine:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-alpine-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Alpine Linux (Podman)
        run: |
          podman run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            alpine:latest sh -c "
            apk add --no-cache rust cargo openssl-dev musl-dev && \
            cargo build --release && \
            mkdir -p /tmp/pkg/usr/bin && \
            mkdir -p /tmp/pkg/usr/share/licenses/bengal && \
            cp target/release/bengal /tmp/pkg/usr/bin/ && \
            cp LICENSE /tmp/pkg/usr/share/licenses/bengal/ && \
            chmod 755 /tmp/pkg/usr/bin/bengal && \
            chmod 644 /tmp/pkg/usr/share/licenses/bengal/LICENSE
            "

      - name: Create Alpine package
        run: |
          mkdir -p alpine-pkg/usr/bin
          mkdir -p alpine-pkg/usr/share/licenses/bengal
          mkdir -p alpine-pkg/usr/share/bengal/std
          cp target/release/bengal alpine-pkg/usr/bin/
          cp LICENSE alpine-pkg/usr/share/licenses/bengal/
          cp std/*.bl alpine-pkg/usr/share/bengal/std/
          chmod 755 alpine-pkg/usr/bin/bengal
          chmod 644 alpine-pkg/usr/share/licenses/bengal/LICENSE
          chmod 644 alpine-pkg/usr/share/bengal/std/*.bl
          cd alpine-pkg
          tar -cvf ../bengal.tar usr
          cd ..
          gzip -9 bengal.tar

      - name: Upload Alpine Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-alpine-${{ matrix.arch }}
          path: bengal.tar.gz
          retention-days: 30

      - name: Upload .tar.gz to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bengal.tar.gz
          tag: ${{ github.ref }}

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          brew install openssl

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.arch == 'amd64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: Create macOS package
        run: |
          mkdir -p artifacts/usr/bin
          mkdir -p artifacts/usr/share/licenses/bengal
          mkdir -p artifacts/usr/share/bengal/std
          cp target/${{ matrix.arch == 'amd64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}/release/bengal artifacts/usr/bin/
          cp LICENSE artifacts/usr/share/licenses/bengal/
          cp std/*.bl artifacts/usr/share/bengal/std/
          chmod 755 artifacts/usr/bin/bengal
          chmod 644 artifacts/usr/share/licenses/bengal/LICENSE
          chmod 644 artifacts/usr/share/bengal/std/*.bl
          cd artifacts
          zip -r ../bengal-darwin-${{ matrix.arch }}.zip usr

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-macos-${{ matrix.arch }}
          path: bengal-darwin-${{ matrix.arch }}.zip
          retention-days: 30

      - name: Upload .zip to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bengal-darwin-${{ matrix.arch }}.zip
          tag: ${{ github.ref }}

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: matrix.arch == 'arm64'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.arch == 'amd64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Create Windows package
        run: |
          mkdir -p artifacts/bin
          mkdir -p artifacts/std
          cp target/${{ matrix.arch == 'amd64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}/release/bengal.exe artifacts/bin/
          cp std/*.bl artifacts/std/
          cd artifacts
          zip -r ../bengal-windows-${{ matrix.arch }}.zip bin std

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: bengal-windows-${{ matrix.arch }}
          path: bengal-windows-${{ matrix.arch }}.zip
          retention-days: 30

      - name: Upload .zip to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bengal-windows-${{ matrix.arch }}.zip
          tag: ${{ github.ref }}
