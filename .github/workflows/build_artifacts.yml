on:
  push:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bengal

jobs:
  build-debian:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-debian-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev

      - name: Build Debian package (with build)
        run: cargo deb

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-debian-${{ matrix.arch }}
          path: target/debian/*.deb
          retention-days: 30

      - name: Upload .deb to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/debian/*.deb
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rpm-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev rpm

      - name: Build release binary
        run: cargo build --release

      - name: Generate RPM package
        run: cargo generate-rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-rpm-${{ matrix.arch }}
          path: target/generate-rpm/*.rpm
          retention-days: 30

      - name: Upload .rpm to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/generate-rpm/*.rpm
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true

  build-archlinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arch-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev zstd

      - name: Build release binary
        run: cargo build --release

      - name: Create Arch Linux package
        run: |
          mkdir -p artifacts/usr/bin
          mkdir -p artifacts/usr/share/licenses/bengal
          cp target/release/bengal artifacts/usr/bin/
          cp LICENSE artifacts/usr/share/licenses/bengal/
          chmod 755 artifacts/usr/bin/bengal
          chmod 644 artifacts/usr/share/licenses/bengal/LICENSE
          cd artifacts
          tar -cvf ../bengal.pkg.tar usr
          cd ..
          zstd -19 bengal.pkg.tar --rm

      - name: Upload Arch Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-archlinux-${{ matrix.arch }}
          path: bengal.pkg.tar.zst
          retention-days: 30

      - name: Upload .pkg.tar.zst to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bengal.pkg.tar.zst
          tag: ${{ github.ref }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows
          path: target/release/bengal.exe
          retention-days: 30

      - name: Upload .exe to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/bengal.exe
          tag: ${{ github.ref }}
