  # ========== WINDOWS ==========
  build-windows-amd64:
    name: Build Windows Package (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target x86_64-pc-windows-msvc

      - name: Create Windows package
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "")
          New-Item -ItemType Directory -Path windows-package\bin -Force
          Copy-Item target\x86_64-pc-windows-msvc\release\bengal.exe windows-package\bin\
          Copy-Item README.md windows-package\
          Compress-Archive -Path windows-package\* -DestinationPath bengal_${VERSION}_windows_amd64.zip -Force

      - name: Create Windows installer (.msi)
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "").Replace("v", "")
          New-Item -ItemType Directory -Path msi-root\ProgramFiles\bengal -Force
          Copy-Item target\x86_64-pc-windows-msvc\release\bengal.exe msi-root\ProgramFiles\bengal\

          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wix) {
            & "$wix\heat.exe" dir msi-root\ProgramFiles\bengal -gg -sfrag -sreg -srd -dr INSTALLFOLDER -cg BengalFiles -var var.BengalSource -o Product.wxs
            # Note: Full MSI build requires additional wix configuration
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-amd64
          path: |
            bengal_*_windows_amd64.zip
            bengal_*_windows_amd64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_windows_amd64.zip
            bengal_*_windows_amd64.exe

  build-windows-arm64:
    name: Build Windows Package (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-pc-windows-msvc

      - name: Install LLVM for cross-compilation
        run: choco install llvm -y

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target aarch64-pc-windows-msvc

      - name: Create Windows package
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "")
          New-Item -ItemType Directory -Path windows-package\bin -Force
          Copy-Item target\aarch64-pc-windows-msvc\release\bengal.exe windows-package\bin\
          Copy-Item README.md windows-package\
          Compress-Archive -Path windows-package\* -DestinationPath bengal_${VERSION}_windows_arm64.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-arm64
          path: |
            bengal_*_windows_arm64.zip
            bengal_*_windows_arm64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_windows_arm64.zip
            bengal_*_windows_arm64.exe