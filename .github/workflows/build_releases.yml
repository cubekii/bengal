    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo dpkg --add-architecture arm64

          # Rewrite sources to pin amd64 to azure mirror, arm64 to ports.ubuntu.com
          sudo tee /etc/apt/sources.list << 'EOF'
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          # Disable the Azure mirrorlist which overrides sources.list and has no arm64
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          sudo rm -f /etc/apt/apt-mirrors.txt

          sudo apt update
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libssl-dev:arm64

      - name: Set pkg-config for cross-compilation
        run: |
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arch-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary (arm64)
        run: |
          cargo build --release --bin bengal --target aarch64-unknown-linux-gnu
          mkdir -p target/release-arm64
          cp target/aarch64-unknown-linux-gnu/release/bengal target/release-arm64/bengal

      - name: Create Arch package structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p arch-package/usr/bin
          mkdir -p arch-package/usr/share/doc/bengal

          cp target/release-arm64/bengal arch-package/usr/bin/
          chmod 755 arch-package/usr/bin/bengal
          cp README.md arch-package/usr/share/doc/bengal/

          tar -czf bengal_${VERSION#v}_arm64.tar.gz -C arch-package usr

      - name: Create PKGBUILD
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cat > PKGBUILD << EOF
          pkgname=bengal
          pkgver=${VERSION#v}
          pkgrel=1
          pkgdesc="Bengal language CLI"
          arch=('arm64' 'aarch64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          provides=('bengal')

          package() {
            cd "\${srcdir}"
            install -Dm755 bengal "\${pkgdir}/usr/bin/bengal"
